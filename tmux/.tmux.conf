# Enable true color
set -g default-terminal "tmux-256color"

# Change prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Set the delay between prefix and command
set -s escape-time 1

# Window and pane index form 1
set -g base-index 1
set -g pane-base-index 1

# Reload the settings
bind r run-shell "tmux source-file ~/.tmux.conf && tmux display-message 'Config Reloaded!'"

# Enable mouse support
set -g mouse on

# Split panes using | and -
bind | split-window -h
bind - split-window -v

# Move between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Enable vi keys
set -w -g mode-keys vi

# Cppy & Paste using system clipboard
bind Escape copy-mode
bind-key -T copy-mode-vi q send-keys -X cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

set -g set-clipboard on
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
unbind p
bind p paste-buffer

# Enalbe acitivity alerts
set -w -g monitor-activity on
set -w -g visual-activity on

#### Plugin manager and plugins ####
# install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Theme Setup
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Make the status line more pleasant.
set -g status-left ""
set -g status-right '#[fg=#{@thm_crust},bg=#{@thm_teal}] session: #S '

# Ensure that everything on the right side of the status line
# is included.
set -g status-right-length 100

set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
